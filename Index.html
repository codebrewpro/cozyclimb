<!DOCTYPE html>
<html>
<head>
  <title>Cozy Climb</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0e0e11; }
  </style>
</head>
<body>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

// Scene
const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 3);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light (cozy magic ✨)
const light = new THREE.PointLight(0xffd9a8, 2);
light.position.set(2, 3, 2);
scene.add(light);

scene.add(new THREE.AmbientLight(0x404040, 1.5));

// 🐾 MIMO (built inline, no extra files)
const mimo = new THREE.Group();

// body
const bodyMat = new THREE.MeshStandardMaterial({ color: 0xf5e6d3 });
const eyeMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });

const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), bodyMat);
head.position.y = 0.8;
mimo.add(head);

const body = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), bodyMat);
body.scale.y = 0.8;
body.position.y = 0.3;
mimo.add(body);

// eyes
const eyeGeo = new THREE.SphereGeometry(0.08, 16, 16);
const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
leftEye.position.set(-0.15, 0.85, 0.45);

const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
rightEye.position.set(0.15, 0.85, 0.45);

mimo.add(leftEye, rightEye);

// legs
const legGeo = new THREE.CapsuleGeometry(0.08, 0.2, 4, 8);
const leftLeg = new THREE.Mesh(legGeo, bodyMat);
leftLeg.position.set(-0.15, 0.05, 0);

const rightLeg = new THREE.Mesh(legGeo, bodyMat);
rightLeg.position.set(0.15, 0.05, 0);

mimo.add(leftLeg, rightLeg);

// tail
const tail = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), bodyMat);
tail.position.set(0, 0.3, -0.35);
mimo.add(tail);

scene.add(mimo);

// ground
const ground = new THREE.Mesh(
  new THREE.BoxGeometry(5, 0.2, 5),
  new THREE.MeshStandardMaterial({ color: 0x2a2a2a })
);
ground.position.y = -0.1;
scene.add(ground);

// animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();

  // breathing
  const scale = 1 + Math.sin(t * 2) * 0.02;
  mimo.scale.set(1, scale, 1);

  renderer.render(scene, camera);
}

animate();

// resize fix
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
